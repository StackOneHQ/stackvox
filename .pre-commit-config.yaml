# Install once per clone: `pre-commit install && pre-commit install --hook-type commit-msg`
# Run manually: `pre-commit run --all-files`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.5.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

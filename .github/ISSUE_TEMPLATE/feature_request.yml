name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case first, not the solution.
      placeholder: "I want to use stackvox as a library from an async context, but the daemon client is synchronous."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional — if you have a shape in mind, sketch it. APIs, CLI flags, config keys, etc.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Optional — other approaches you rejected, and why.

  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this.
